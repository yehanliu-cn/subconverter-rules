[custom]
; --- 1. 策略组定义 (基于 ACL4SSR_Online_Full_MultiMode 深度定制) ---

; 核心路由
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🌍 其他国家`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔮 负载均衡`load-balance`.*`http://www.gstatic.com/generate_204`300,,50

; --- 🔒 手动切换锁定组 (6个通用组，可自定义绑定任何节点) ---
; 前2组：只锁定 Ash6 SG+JP 节点
custom_proxy_group=🔒 手动切换1`select`.*(SG-IEPL|JP-IEPL|JP-Direct).*
custom_proxy_group=🔒 手动切换2`select`.*(SG-IEPL|JP-IEPL|JP-Direct).*
; 后4组：包含全部节点
custom_proxy_group=🔒 手动切换3`select`.*
custom_proxy_group=🔒 手动切换4`select`.*
custom_proxy_group=🔒 手动切换5`select`.*
custom_proxy_group=🔒 手动切换6`select`.*

; --- 🤖 AI 专属隔离组 ---
; Claude 独立锁节点（防封）
custom_proxy_group=💬 Claude`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6
; ChatGPT + Gemini + Copilot 合并（共用域名多）
custom_proxy_group=💬 ChatGPT+Gemini`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6
; 其他海外AI（小众平台，方便全球各地连接）
custom_proxy_group=💬 其他海外AI`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6

; 国内 AI 直连
custom_proxy_group=🇨🇳 国内AI`select`[]DIRECT

; 国内直连（国内IP+域名+局域网）
custom_proxy_group=🇨🇳 国内直连`select`[]DIRECT

; --- 🎬 常用流媒体与服务组 (ACL4SSR_Online_Full_MultiMode 骨架) ---
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🌍 其他国家`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🎥 奈飞视频`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🌍 其他国家`[]🚀 手动切换
custom_proxy_group=🎮 游戏平台`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🌍 其他国家`[]🚀 手动切换
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🌍 其他国家`[]🚀 手动切换

