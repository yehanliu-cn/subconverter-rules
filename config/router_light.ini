[custom]
; 路由器轻量版：只保留国内直连、AI/Google、Netflix 和自动兜底
; 设计目标：
; 1. 保留 手动切换1-6
; 2. AI 仅走 手动切换1-6
; 3. Google 通用服务拆出，避免与 AI 锁节点绑定
; 3. Netflix 默认锁香港
; 4. 其他服务谁快走谁

; --- 核心路由 ---
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇨🇳 台湾节点`[]🇰🇷 韩国节点`[]🌍 其他国家`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔮 负载均衡`load-balance`.*`http://www.gstatic.com/generate_204`300,,50

; --- 手动切换锁定组（保留 1-6）---
custom_proxy_group=🔒 手动切换1`select`.*(SG-IEPL|JP-IEPL|JP-Direct).*
custom_proxy_group=🔒 手动切换2`select`.*(SG-IEPL|JP-IEPL|JP-Direct).*
custom_proxy_group=🔒 手动切换3`select`.*
custom_proxy_group=🔒 手动切换4`select`.*
custom_proxy_group=🔒 手动切换5`select`.*
custom_proxy_group=🔒 手动切换6`select`.*

; --- 轻量业务组 ---
custom_proxy_group=💬 Claude`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6
custom_proxy_group=💬 ChatGPT`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6
