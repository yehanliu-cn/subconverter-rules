[custom]
; jfcpaul 的 subconverter 配置模板（目标客户端：Stash）
; 适用：中国网络环境，优先保证 AI / Google / 海外站点可用性
; 设计：
; 1. Claude / ChatGPT / Gemini / 其他海外 AI 默认手动锁定代理组
; 2. Google 服务与全球常见海外服务默认走代理
; 3. 国内流量维持直连，漏网流量默认自动选择

; --- 核心路由 ---
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇨🇳 台湾节点`[]🇰🇷 韩国节点`[]🌍 其他国家`[]🚀 手动切换
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔮 负载均衡`load-balance`.*`http://www.gstatic.com/generate_204`300,,50

; --- 手动锁定组 ---
custom_proxy_group=🔒 手动切换1`select`.*(HK|SG|JP|US|TW|KR|港|台|新|日|美|韩).*
custom_proxy_group=🔒 手动切换2`select`.*(HK|SG|JP|US|TW|KR|港|台|新|日|美|韩).*
custom_proxy_group=🔒 手动切换3`select`.*
custom_proxy_group=🔒 手动切换4`select`.*
custom_proxy_group=🔒 手动切换5`select`.*
custom_proxy_group=🔒 手动切换6`select`.*

; --- 业务组 ---
custom_proxy_group=💬 Claude`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6`[]🇺🇲 美国节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🚀 手动切换
custom_proxy_group=💬 ChatGPT`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🚀 手动切换
custom_proxy_group=💬 Gemini`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🚀 手动切换
custom_proxy_group=🌐 Google服务`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🚀 节点选择`[]🚀 手动切换
custom_proxy_group=💬 其他海外AI`select`[]🔒 手动切换1`[]🔒 手动切换2`[]🔒 手动切换3`[]🔒 手动切换4`[]🔒 手动切换5`[]🔒 手动切换6`[]🚀 手动切换
custom_proxy_group=🎥 奈飞视频`select`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇨🇳 台湾节点`[]🇰🇷 韩国节点`[]🌍 其他国家`[]🚀 节点选择`[]🚀 手动切换
custom_proxy_group=🌐 全球服务`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇨🇳 台湾节点`[]🇰🇷 韩国节点`[]🌍 其他国家`[]🚀 节点选择`[]🚀 手动切换
custom_proxy_group=🇨🇳 国内直连`select`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]♻️ 自动选择`[]🚀 节点选择`[]🌐 全球服务`[]DIRECT`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🚀 手动切换

; --- 国家地区底层池 ---
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|hk|Hong Kong|HongKong|hongkong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇨🇳 台湾节点`url-test`(台灣|台湾|台北|臺北|新北|彰化|Taiwan|Taipei|(^|[-_\\[( ])(TW|TWN)([-_\\]) ]|$))`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|东京|大阪|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 狮城节点`url-test`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇰🇷 韩国节点`url-test`(KR|Korea|KOR|首尔|韩|韓)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌍 其他国家`url-test`(德|英|法国|印|荷|澳|MO|Macau|DE|IN|LT|NL|UK|United Kingdom|Britain|England|London|FR|MY|AU|EE|Vodafone|O2|Three)`http://www.gstatic.com/generate_204`300,,50

